<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Categorias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-5" style="max-width: 600px;">
        <!-- User ID Fixo - Em uma aplicação real, viria do login -->
        <input type="hidden" id="userId" name="userId" value="1">

        <div class="card">
            <div class="card-header">
                <h3>Gerenciar Categorias</h3>
            </div>
            <div class="card-body">
                <form id="categoriaForm">
                    <div class="mb-3">
                        <label for="categoriaNome" class="form-label">Nome da Categoria</label>
                        <input type="text" class="form-control" id="categoriaNome" name="nome" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Salvar Categoria</button>
                </form>
                <div id="categoriaMensagem" class="mt-3"></div>
            </div>
            <div class="card-footer">
                <h5>Categorias Cadastradas</h5>
                <ul class="list-group" id="listaCategorias">
                    <!-- A lista será preenchida pelo JavaScript -->
                </ul>
            </div>
        </div>
    </div>

    <script src="/js/entity-manager.js"></script>
    <script src="/js/categorias.js"></script>
</body>

</html>
