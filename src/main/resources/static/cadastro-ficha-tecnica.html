<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Nova Receita - Akari</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h3 class="mb-0">Cadastrar Ficha Técnica</h3>
            </div>
            <div class="card-body">
                <form id="fichaForm">
                    <input type="hidden" id="userId" value="1">

                    <div class="mb-3">
                        <label class="form-label fw-bold">Nome da Receita</label>
                        <input type="text" id="nomeFicha" class="form-control" placeholder="Ex: Bolo de Cenoura"
                            required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Ingredientes</label>
                        <table class="table table-hover border" id="tabelaIngredientes">
                            <thead class="table-light">
                                <tr>
                                    <th>Produto</th>
                                    <th>Quantidade (Per Capita)</th>
                                    <th style="width: 50px;"></th>
                                </tr>
                            </thead>
                            <tbody>
                            </tbody>
                        </table>
                        <button type="button" class="btn btn-outline-primary btn-sm" id="btnAdicionarIngrediente">
                            + Adicionar Ingrediente
                        </button>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Modo de Preparo</label>
                        <textarea id="modoDePreparo" class="form-control" rows="4"
                            placeholder="Descreva o passo a passo..."></textarea>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success btn-lg">Salvar Receita</button>
                        <a href="/" class="btn btn-link text-secondary">Voltar</a>
                    </div>
                </form>
                <div id="mensagem" class="mt-3"></div>
            </div>
        </div>
    </div>

    <script src="js/ficha-tecnica.js"></script>
</body>

</html>
