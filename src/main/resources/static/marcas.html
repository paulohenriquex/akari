<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Marcas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-5" style="max-width: 600px;">

        <input type="hidden" id="userId" name="userId" value="1">

        <div class="card">
            <div class="card-header">
                <h3>Gerenciar Marcas</h3>
            </div>

            <div class="card-body">
                <form id="marcaForm">

                    <div class="mb-3">
                        <label for="marcaNome" class="form-label">
                            Nome da Marca
                        </label>

                        <input type="text" class="form-control" id="marcaNome" name="nome" required>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        Salvar Marca
                    </button>

                </form>

                <div id="marcaMensagem" class="mt-3"></div>
            </div>

            <div class="card-footer">
                <h5>Marcas Cadastradas</h5>

                <ul class="list-group" id="listaMarcas">
                </ul>
            </div>
        </div>
    </div>

    <script src="/js/entity-manager.js"></script>
    <script src="/js/marcas.js"></script>
</body>

</html>
