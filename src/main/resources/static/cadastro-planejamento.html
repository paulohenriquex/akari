<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Cadastro de Planejamentos</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
    </head>

    <body class="bg-light">
        <div class="container my-5">
            <input type="hidden" id="userId" value="1" />

            <div class="row g-4">
                <div class="col-lg-5">
                    <div class="card shadow-sm">
                        <div class="card-header bg-primary text-white">
                            <h3 class="mb-0">Novo Planejamento</h3>
                        </div>

                        <div class="card-body">
                            <form id="planejamentoForm">
                                <div class="mb-3">
                                    <label for="data" class="form-label"
                                        >Data do serviço</label
                                    >
                                    <input
                                        type="date"
                                        id="data"
                                        class="form-control"
                                        required
                                    />
                                </div>

                                <div class="mb-3">
                                    <label for="servicoSelect" class="form-label"
                                        >Serviço</label
                                    >
                                    <select
                                        id="servicoSelect"
                                        class="form-select"
                                        required
                                    >
                                        <option value="">
                                            Carregando serviços...
                                        </option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label
                                        for="quantidadePessoas"
                                        class="form-label"
                                        >Quantidade de pessoas</label
                                    >
                                    <input
                                        type="number"
                                        id="quantidadePessoas"
                                        class="form-control"
                                        min="1"
                                        required
                                    />
                                </div>

                                <div class="mb-4">
                                    <label for="buscaFichaTecnica" class="form-label"
                                        >Fichas técnicas</label
                                    >
                                    <input
                                        type="search"
                                        id="buscaFichaTecnica"
                                        class="form-control mb-2"
                                        placeholder="Digite para buscar uma ficha técnica"
                                        autocomplete="off"
                                    />
                                    <div
                                        id="fichasSelecionadas"
                                        class="d-flex flex-wrap gap-2 mb-2"
                                    ></div>
                                    <div
                                        id="listaFichas"
                                        class="list-group overflow-auto"
                                        style="max-height: 260px"
                                    ></div>
                                </div>

                                <div class="d-grid gap-2">
                                    <button
                                        type="submit"
                                        class="btn btn-primary btn-lg"
                                    >
                                        Salvar Planejamento
                                    </button>
                                    <a
                                        href="/cadastro-ficha-tecnica.html"
                                        class="btn btn-outline-secondary"
                                    >
                                        Cadastrar Ficha Técnica
                                    </a>
                                </div>
                            </form>

                            <div id="mensagem" class="mt-3"></div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-7">
                    <div class="card shadow-sm mb-4">
                        <div class="card-header">
                            <h4 class="mb-0">Lista de Compras</h4>
                        </div>
                        <div class="card-body">
                            <div id="listaComprasResumo" class="text-muted">
                                Salve um planejamento para gerar a lista.
                            </div>
                        </div>
                    </div>

                    <div class="card shadow-sm">
                        <div class="card-header">
                            <h4 class="mb-0">Planejamentos Cadastrados</h4>
                        </div>
                        <div class="card-body">
                            <div id="listaPlanejamentos" class="list-group">
                                <div class="list-group-item text-muted">
                                    Carregando planejamentos...
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="/js/planejamento.js"></script>
    </body>
</html>
