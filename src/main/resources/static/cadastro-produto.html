<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Cadastro de Produtos</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
    </head>

    <body>
        <div class="container mt-5" style="max-width: 600px">
            <div class="card">
                <div class="card-header">
                    <h3>Novo Produto</h3>
                </div>
                <div class="card-body">
                    <form id="produtoForm">
                        <div class="mb-3">
                            <label for="nome" class="form-label">Nome:</label>
                            <input
                                type="text"
                                id="nome"
                                name="nome"
                                class="form-control"
                                required
                            />
                        </div>
                        <div class="mb-3">
                            <label for="preco" class="form-label"
                                >Preço (R$):</label
                            >
                            <input
                                type="number"
                                id="preco"
                                name="preco"
                                step="0.01"
                                class="form-control"
                                required
                            />
                        </div>
                        <div class="mb-3">
                            <label for="medida" class="form-label"
                                >Unidade (KG, L, UN):</label
                            >
                            <input
                                type="text"
                                id="medida"
                                name="medida"
                                class="form-control"
                                required
                            />
                        </div>
                        <div class="mb-3">
                            <label for="marcaSelect" class="form-label"
                                >Marca:</label
                            >
                            <div class="input-group">
                                <select
                                    name="marcaId"
                                    id="marcaSelect"
                                    class="form-select"
                                    required
                                >
                                    <option value="">
                                        Selecione uma marca
                                    </option>
                                </select>
                                <button
                                    class="btn btn-outline-secondary"
                                    type="button"
                                    data-bs-toggle="modal"
                                    data-bs-target="#modalNovaMarca"
                                >
                                    +
                                </button>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="categoriaSelect" class="form-label"
                                >Categoria:</label
                            >
                            <div class="input-group">
                                <select
                                    name="categoriaId"
                                    id="categoriaSelect"
                                    class="form-select"
                                    required
                                >
                                    <option value="">
                                        Selecione uma Categoria
                                    </option>
                                </select>
                                <button
                                    class="btn btn-outline-secondary"
                                    type="button"
                                    data-bs-toggle="modal"
                                    data-bs-target="#modalNovaCategoria"
                                >
                                    +
                                </button>
                            </div>
                        </div>
                        <input type="hidden" name="userId" value="1" />
                        <button type="submit" class="btn btn-primary">
                            Cadastrar
                        </button>
                    </form>
                    <div id="mensagem" class="mt-3"></div>
                </div>
            </div>
        </div>

        <!-- Modal para Nova Marca -->
        <div class="modal fade" id="modalNovaMarca" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Criar Nova Marca</h5>
                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"
                        ></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="inputNomeNovaMarca" class="form-label"
                                >Nome da Marca</label
                            >
                            <input
                                type="text"
                                class="form-control"
                                id="inputNomeNovaMarca"
                            />
                        </div>
                        <div id="mensagemModalMarca"></div>
                    </div>
                    <div class="modal-footer">
                        <button
                            type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal"
                        >
                            Fechar
                        </button>
                        <button
                            type="button"
                            class="btn btn-primary"
                            id="btnSalvarNovaMarca"
                        >
                            Salvar Marca
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal para Nova Categoria -->
        <div class="modal fade" id="modalNovaCategoria" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Criar Nova Categoria</h5>
                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"
                        ></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label
                                for="inputNomeNovaCategoria"
                                class="form-label"
                                >Nome da Categoria</label
                            >
                            <input
                                type="text"
                                class="form-control"
                                id="inputNomeNovaCategoria"
                            />
                        </div>
                        <div id="mensagemModalCategoria"></div>
                    </div>
                    <div class="modal-footer">
                        <button
                            type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal"
                        >
                            Fechar
                        </button>
                        <button
                            type="button"
                            class="btn btn-primary"
                            id="btnSalvarNovaCategoria"
                        >
                            Salvar Categoria
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="js/produto.js"></script>
    </body>
</html>
